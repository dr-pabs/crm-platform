name: CD — Dev

on:
  push:
    branches: [develop]

permissions:
  id-token: write   # OIDC auth to Azure — no stored credentials
  contents: read

env:
  ACR_NAME: ${{ vars.DEV_ACR_NAME }}
  ACA_RESOURCE_GROUP: crm-dev-rg
  APIM_URL: ${{ vars.DEV_APIM_URL }}

jobs:
  build-push-deploy:
    name: Build, Push & Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC — no stored credentials)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push container images
        run: |
          az acr login --name ${{ env.ACR_NAME }}
          IMAGE_TAG=sha-${{ github.sha }}
          for service in sfa-service css-service marketing-service analytics-service \
            ai-orchestration-service identity-service integration-service \
            notification-service platform-admin-service; do
            echo "Building ${service}"
            docker build -t ${{ env.ACR_NAME }}.azurecr.io/${service}:${IMAGE_TAG} \
              src/services/${service}
            docker push ${{ env.ACR_NAME }}.azurecr.io/${service}:${IMAGE_TAG}
          done

      - name: Microsoft Defender — image vulnerability scan
        run: |
          IMAGE_TAG=sha-${{ github.sha }}
          # Trigger a scan and wait for results. In dev we warn rather than block.
          for service in sfa-service css-service marketing-service analytics-service \
            ai-orchestration-service identity-service integration-service \
            notification-service platform-admin-service; do
            az security task list \
              --query "[?contains(resourceDetails.id, '${service}') && contains(resourceDetails.id, '${IMAGE_TAG}')].{name:name,state:state}" \
              --output table || true
          done
          echo "Defender scan initiated — results visible in Microsoft Defender for Containers"

      - name: Deploy infrastructure (Bicep)
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: uksouth
          template: infra/platform/main.bicep
          parameters: infra/platform/parameters/dev.bicepparam imageTag=sha-${{ github.sha }}

      - name: Smoke tests — verify health endpoints
        run: |
          # Wait for Container Apps to become ready (up to 3 minutes)
          sleep 60
          APIM_URL="${{ env.APIM_URL }}"
          EXIT_CODE=0
          for service_path in sfa css marketing analytics identity notification platform; do
            HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              "${APIM_URL}/api/v1/${service_path}/health/ready" \
              --retry 5 --retry-delay 10 || echo "000")
            if [ "${HTTP_STATUS}" = "200" ]; then
              echo "✓ ${service_path} health/ready: ${HTTP_STATUS}"
            else
              echo "✗ ${service_path} health/ready: ${HTTP_STATUS}"
              EXIT_CODE=1
            fi
          done
          exit ${EXIT_CODE}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const webhookUrl = process.env.TEAMS_WEBHOOK_URL;
            if (!webhookUrl) { console.log('TEAMS_WEBHOOK_URL not set — skipping notification'); return; }
            await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                "@type": "MessageCard",
                "@context": "http://schema.org/extensions",
                "themeColor": "FF0000",
                "summary": "CRM Platform — Dev deploy failed",
                "sections": [{
                  "activityTitle": "Dev deployment failed",
                  "activitySubtitle": `Branch: ${context.ref} | Commit: ${context.sha.slice(0,7)}`,
                  "facts": [
                    { "name": "Workflow", "value": context.workflow },
                    { "name": "Run", "value": `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` }
                  ]
                }]
              })
            });
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
