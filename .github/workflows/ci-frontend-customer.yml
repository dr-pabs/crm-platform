name: CI – Customer Portal

on:
  push:
    branches: [main, develop]
    paths:
      - 'crm-platform/src/frontend/customer-portal/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'crm-platform/src/frontend/customer-portal/**'

defaults:
  run:
    working-directory: crm-platform/src/frontend/customer-portal

jobs:
  lint-typecheck-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crm-platform/src/frontend/customer-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: customer-portal-coverage
          path: crm-platform/src/frontend/customer-portal/coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crm-platform/src/frontend/customer-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_MSAL_CLIENT_ID: ${{ secrets.CUSTOMER_PORTAL_MSAL_CLIENT_ID }}
          VITE_MSAL_AUTHORITY: ${{ secrets.CUSTOMER_PORTAL_MSAL_AUTHORITY }}
          VITE_MSAL_REDIRECT_URI: ${{ secrets.CUSTOMER_PORTAL_MSAL_REDIRECT_URI }}
          VITE_API_BASE_URL: ${{ secrets.CUSTOMER_PORTAL_API_BASE_URL }}
          VITE_API_SCOPE: ${{ secrets.CUSTOMER_PORTAL_API_SCOPE }}

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: customer-portal-dist
          path: crm-platform/src/frontend/customer-portal/dist
